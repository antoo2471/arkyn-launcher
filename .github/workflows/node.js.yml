name: Electron CI/CD

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-release:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}

    steps:
      # 1️⃣ Checkout du code
      - uses: actions/checkout@v4

      # 2️⃣ Setup Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.x

      # 3️⃣ Installer les dépendances
      - name: Install dependencies
        run: npm i

      # 4️⃣ Récupérer la version du package.json
      - name: Get version from package.json
        id: get_version
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "VERSION=$VERSION" >> $GITHUB_ENV

      # 5️⃣ Définir le PAT pour electron-builder
      - name: Set GH_PAT for electron-builder
        run: echo "GH_TOKEN=${{ secrets.GH_PAT }}" >> $GITHUB_ENV

      # 6️⃣ Build Electron selon l'OS
      - name: Build Electron app
        run: |
          if [[ "$RUNNER_OS" == "Linux" ]]; then npm run electron:pack:linux; fi
          if [[ "$RUNNER_OS" == "Windows" ]]; then npm run electron:pack:win; fi
          if [[ "$RUNNER_OS" == "macOS" ]]; then npm run electron:pack:mac; fi

      # 7️⃣ Créer la release GitHub
      - name: Create GitHub release
        id: create_release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: "v${{ env.VERSION }}"
          name: "v${{ env.VERSION }}"
          draft: false
          prerelease: false
          token: ${{ secrets.GH_PAT }}

      # 8️⃣ Upload tous les fichiers générés (exe, dmg, AppImage, YAML, etc)
      - name: Upload release assets
        uses: softprops/action-gh-release@v1
        with:
          files: "dist-electron/**/*"
        env:
          GITHUB_TOKEN: ${{ secrets.GH_PAT }}