name: Electron CI/CD

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-release:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.x

      - name: Install dependencies
        run: npm ci

      - name: Get version from package.json
        id: get_version
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "VERSION=$VERSION" >> $GITHUB_ENV

      - name: Build Electron app
        run: |
          if [[ "$RUNNER_OS" == "Linux" ]]; then npm run electron:pack:linux; fi
          if [[ "$RUNNER_OS" == "Windows" ]]; then npm run electron:pack:win; fi
          if [[ "$RUNNER_OS" == "macOS" ]]; then npm run electron:pack:mac; fi

      - name: Create GitHub release
        id: create_release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: "v${{ env.VERSION }}"
          name: "v${{ env.VERSION }}"
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload release assets (exe, dmg, AppImage, YAML...)
        uses: softprops/action-gh-release@v1
        with:
          files: "dist-electron/**/*"  # upload tout ce que builder a créé, y compris YAML
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
