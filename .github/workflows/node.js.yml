name: Electron CI/CD

on:
  push:
    tags:
      - 'v*.*.*'   # Déclenche uniquement sur un tag vX.Y.Z

jobs:
  build-and-release:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}

    steps:
      # 1️⃣ Checkout du code
      - uses: actions/checkout@v4

      # 2️⃣ Setup Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.x

      # 3️⃣ Installer les dépendances
      - name: Install dependencies
        run: npm ci

      # 4️⃣ Get version from tag (ex: v3.1.2 → 3.1.2)
      - name: Get version from tag
        id: get_version
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          echo "VERSION=$VERSION" >> $GITHUB_ENV

      # 5️⃣ Build Electron selon l'OS
      - name: Build Electron app
        run: |
          if [[ "$RUNNER_OS" == "Linux" ]]; then npm run electron:pack:linux; fi
          if [[ "$RUNNER_OS" == "Windows" ]]; then npm run electron:pack:win; fi
          if [[ "$RUNNER_OS" == "macOS" ]]; then npm run electron:pack:mac; fi

      # 6️⃣ Créer la release GitHub
      - name: Create GitHub release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: "${{ github.ref_name }}"
          name: "${{ github.ref_name }}"
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # 7️⃣ Upload tous les fichiers générés (exe, dmg, AppImage, YAML, etc.)
      - name: Upload release assets
        uses: softprops/action-gh-release@v1
        with:
          files: "dist-electron/**/*"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}