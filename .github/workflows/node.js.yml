name: Build and Release Electron App

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-release:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-slim, windows-2025-vs2026, macos-latest]

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install dependencies
        run: npm i

      - name: Get version
        run: node -p "require('./package.json').version" | xargs -I {} echo "VERSION={}" >> $GITHUB_ENV
        shell: bash

      - name: Build Electron
        run: |
          if [ "$RUNNER_OS" = "Linux" ]; then npm run electron:pack:linux -- --publish always; fi
          if [ "$RUNNER_OS" = "Windows" ]; then npm run electron:pack:win -- --publish always; fi
          if [ "$RUNNER_OS" = "macOS" ]; then npm run electron:pack:mac -- --publish always; fi
        env:
          GH_TOKEN: ${{ secrets.PAT_TOKEN }}

      - name: Create Release and Upload Assets
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ env.VERSION }}
          name: v${{ env.VERSION }}
          draft: false
          prerelease: false
          files: |
            *.dmg
            *.exe
            *.AppImage
            *.appimage
            *.yml
        env:
          GITHUB_TOKEN: ${{ secrets.PAT_TOKEN }}