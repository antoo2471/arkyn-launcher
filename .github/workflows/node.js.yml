name: Build and Release Electron App

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-release:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install dependencies
        run: npm i

      - name: Get version
        id: get_version
        run: echo "VERSION=$(node -p \"require('./package.json').version\")" >> $GITHUB_ENV

      - name: Build Electron
        run: |
          if [[ "$RUNNER_OS" == "Linux" ]]; then npm run electron:pack:linux -- --publish always; fi
          if [[ "$RUNNER_OS" == "Windows" ]]; then npm run electron:pack:win -- --publish always; fi
          if [[ "$RUNNER_OS" == "macOS" ]]; then npm run electron:pack:mac -- --publish always; fi
        env:
          GH_TOKEN: ${{ secrets.PAT_TOKEN }}

      - name: Create Release and Upload Assets
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ env.VERSION }}
          name: v${{ env.VERSION }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.PAT_TOKEN }}

      - name: Upload build artifacts
        uses: actions/upload-release-asset@v1
        with:
          upload_url: ${{ steps.release.outputs.upload_url }}
          asset_path: ./dist-electron
          asset_name: Arkyn-Launcher-${{ env.VERSION }}-${{ runner.os }}.zip
          asset_content_type: application/zip